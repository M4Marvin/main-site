      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#737373">

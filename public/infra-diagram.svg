      <text x="20" y="88">vaultwarden</text>
      <text x="20" y="104">uptime-kuma</text>
      <text x="20" y="120">copyparty · portfolio · charts · chat</text>
    </g>

    <g font-family="ui-monospace, monospace" font-size="10" fill="#a3a3a3">
      <text x="280" y="72">127.0.0.1:8001-8009</text>
      <text x="280" y="88">UFW default-deny</text>
      <text x="280" y="104">SSH :3232</text>
      <text x="280" y="120">AIDE · fail2ban · unattended</text>

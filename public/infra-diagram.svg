    <text x="660" y="30" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" fill="#1a1a1a">6 subdomains</text>
  </g>

  <g stroke="#f48120" stroke-width="1.5" fill="none" opacity="0.6">

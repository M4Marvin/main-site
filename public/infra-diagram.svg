    <g transform="translate(140,12)">
      <rect width="120" height="28" rx="4" fill="#1a1a1a" stroke="#7c3aed" stroke-width="1"/>
      <text x="60" y="18" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#c4b5fd">beast</text>
    </g>
    <g transform="translate(280,12)">

    <text x="20" y="42" font-family="ui-monospace, monospace" font-size="10" fill="#737373">77.42.65.13 · 4 vCPU · 7.6GB · Ubuntu 24.04</text>

    <g font-family="ui-monospace, monospace" font-size="10" fill="#d4d4d4">

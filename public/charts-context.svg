<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-label="C4 System Context diagram: a trader uses Cloudflare Edge to reach Marv Financial Charts, which downloads trade data from Binance and Bybit APIs">
  <defs>
    <linearGradient id="ctx-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f48120"/>
    </marker>
  </defs>

  <rect width="800" height="460" fill="url(#ctx-bg)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#737373">
    <text x="20" y="22" font-size="10" fill="#a3a3a3" letter-spacing="2">C4 · LEVEL 1 · SYSTEM CONTEXT</text>
    <text x="780" y="22" font-size="10" fill="#a3a3a3" letter-spacing="2" text-anchor="end">charts.m4marvin.com</text>
  </g>

  <g transform="translate(360,40)">
    <circle cx="40" cy="22" r="14" fill="none" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="40" y1="36" x2="40" y2="64" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="24" y1="48" x2="56" y2="48" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="40" y1="64" x2="28" y2="84" stroke="#e5e5e5" stroke-width="1.5"/>
    <line x1="40" y1="64" x2="52" y2="84" stroke="#e5e5e5" stroke-width="1.5"/>
    <text x="40" y="104" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#e5e5e5">Trader</text>
    <text x="40" y="118" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#737373">browser user</text>
  </g>

  <g transform="translate(40,170)">
    <rect width="200" height="100" rx="6" fill="#171717" stroke="#f48120" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text x="190" y="16" text-anchor="end" font-family="ui-monospace, monospace" font-size="8" fill="#f48120" font-style="italic">&lt;&lt;software system&gt;&gt;</text>
    <text x="16" y="38" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#f48120">Cloudflare Edge</text>
    <text x="16" y="56" font-family="ui-monospace, monospace" font-size="9" fill="#a3a3a3">Anycast CDN · WAF · DDoS</text>
    <text x="16" y="72" font-family="ui-monospace, monospace" font-size="9" fill="#737373">TLS termination</text>
    <text x="16" y="86" font-family="ui-monospace, monospace" font-size="9" fill="#737373">Post-quantum tunnel</text>
  </g>

  <g transform="translate(300,160)">
    <rect width="200" height="120" rx="6" fill="#1a1a1a" stroke="#e5e5e5" stroke-width="2"/>
    <text x="190" y="16" text-anchor="end" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3" font-style="italic">&lt;&lt;software system&gt;&gt;</text>
    <text x="16" y="38" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#ffffff">Marv Financial Charts</text>
    <text x="16" y="56" font-family="ui-monospace, monospace" font-size="9" fill="#a3a3a3">Docker · python:3.14-slim</text>
    <text x="16" y="72" font-family="ui-monospace, monospace" font-size="9" fill="#737373">FastAPI + React SPA · :8001</text>
    <text x="16" y="88" font-family="ui-monospace, monospace" font-size="9" fill="#737373">Parquet data lake (~1.5GB)</text>
    <text x="16" y="104" font-family="ui-monospace, monospace" font-size="9" fill="#737373">Hetzner VPS · 127.0.0.1</text>
  </g>

  <g transform="translate(560,130)">
    <rect width="200" height="80" rx="6" fill="#171717" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text x="190" y="16" text-anchor="end" font-family="ui-monospace, monospace" font-size="8" fill="#3b82f6" font-style="italic">&lt;&lt;external system&gt;&gt;</text>
    <text x="16" y="36" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#3b82f6">Binance API</text>
    <text x="16" y="52" font-family="ui-monospace, monospace" font-size="9" fill="#a3a3a3">fapi.binance.com</text>
    <text x="16" y="68" font-family="ui-monospace, monospace" font-size="9" fill="#737373">historical trade data</text>
  </g>

  <g transform="translate(560,230)">
    <rect width="200" height="80" rx="6" fill="#171717" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text x="190" y="16" text-anchor="end" font-family="ui-monospace, monospace" font-size="8" fill="#3b82f6" font-style="italic">&lt;&lt;external system&gt;&gt;</text>
    <text x="16" y="36" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#3b82f6">Bybit API</text>
    <text x="16" y="52" font-family="ui-monospace, monospace" font-size="9" fill="#a3a3a3">api.bybit.com</text>
    <text x="16" y="68" font-family="ui-monospace, monospace" font-size="9" fill="#737373">historical trade data</text>
  </g>

  <g fill="none" stroke="#525252" stroke-width="1.5">
    <path d="M 380 130 L 150 170" marker-end="url(#arrow-grey)"/>
    <path d="M 400 130 L 400 160" marker-end="url(#arrow-grey)"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="8" fill="#737373">
    <text x="240" y="155" text-anchor="middle">visits (HTTPS)</text>
    <text x="408" y="150">manages</text>
  </g>

  <g fill="none" stroke="#f48120" stroke-width="1.5">
    <path d="M 240 210 L 300 210" marker-end="url(#arrow-orange)"/>
    <path d="M 300 240 L 240 240" marker-end="url(#arrow-orange)"/>
  </g>
  <text x="270" y="200" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#f48120">routes via tunnel</text>

  <g fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 3">
    <path d="M 500 180 L 560 170" marker-end="url(#arrow-blue)"/>
    <path d="M 500 240 L 560 250" marker-end="url(#arrow-blue)"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="8" fill="#3b82f6">
    <text x="530" y="165" text-anchor="middle">downloads</text>
    <text x="530" y="265" text-anchor="middle">downloads</text>
  </g>

  <g transform="translate(20,360)">
    <text x="0" y="0" font-family="ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="1">LEGEND</text>
    <g transform="translate(0,12)">
      <circle cx="8" cy="8" r="6" fill="none" stroke="#e5e5e5" stroke-width="1"/>
      <text x="22" y="11" font-family="ui-monospace, monospace" font-size="8" fill="#737373">person</text>
    </g>
    <g transform="translate(80,4)">
      <rect width="16" height="12" rx="2" fill="#1a1a1a" stroke="#e5e5e5" stroke-width="1"/>
      <text x="24" y="13" font-family="ui-monospace, monospace" font-size="8" fill="#737373">system under design</text>
    </g>
    <g transform="translate(220,4)">
      <rect width="16" height="12" rx="2" fill="#171717" stroke="#525252" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="24" y="13" font-family="ui-monospace, monospace" font-size="8" fill="#737373">external system</text>
    </g>
    <g transform="translate(340,10)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#525252" stroke-width="1.5"/>
      <text x="26" y="3" font-family="ui-monospace, monospace" font-size="8" fill="#737373">synchronous</text>
    </g>
    <g transform="translate(440,10)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#525252" stroke-width="1.5" stroke-dasharray="4 2"/>
      <text x="26" y="3" font-family="ui-monospace, monospace" font-size="8" fill="#737373">offline (ETL only)</text>
    </g>
  </g>
</svg>

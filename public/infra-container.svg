    <text x="724" y="22" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#737373">Ubuntu 24.04 · kernel 6.8</text>

    <g transform="translate(16,40)">
      <rect width="100" height="62" rx="4" fill="#1a1a1a" stroke="#525252" stroke-width="1"/>
      <text x="50" y="16" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;container&gt;&gt;</text>
      <text x="50" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#e5e5e5">Forgejo</text>
      <text x="50" y="44" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">Go + SQLite</text>
      <text x="50" y="56" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#f48120">:8003</text>
    </g>
    <g transform="translate(126,40)">
      <rect width="100" height="62" rx="4" fill="#1a1a1a" stroke="#525252" stroke-width="1"/>
      <text x="50" y="16" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;container&gt;&gt;</text>
      <text x="50" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#e5e5e5">Vaultwarden</text>
      <text x="50" y="44" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">Rust · Duo 2FA</text>
      <text x="50" y="56" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#f48120">:8004</text>
    </g>
    <g transform="translate(236,40)">
      <rect width="100" height="62" rx="4" fill="#1a1a1a" stroke="#525252" stroke-width="1"/>
      <text x="50" y="16" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;container&gt;&gt;</text>
      <text x="50" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#e5e5e5">Uptime Kuma</text>
      <text x="50" y="44" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">Node.js</text>
      <text x="50" y="56" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#f48120">:8005</text>
    </g>

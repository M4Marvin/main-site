      <text x="50" y="16" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;container&gt;&gt;</text>
      <text x="50" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#e5e5e5">Portfolio</text>
      <text x="50" y="44" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">nginx + React</text>
      <text x="50" y="56" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#f48120">:8001</text>
    </g>
    <g transform="translate(566,40)">

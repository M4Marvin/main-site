      <text x="25" y="16" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;ctn&gt;&gt;</text>
      <text x="25" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="700" fill="#e5e5e5">Chat</text>
      <text x="25" y="44" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#a3a3a3">Auth+SQLite</text>
      <text x="25" y="56" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#f48120">:8002</text>
    </g>

    <g transform="translate(16,120)">

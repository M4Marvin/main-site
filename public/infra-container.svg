    <g font-family="ui-monospace, monospace" font-size="9" fill="#737373">
      <text x="16" y="190">↳ all containers bind to 127.0.0.1 · no port on 0.0.0.0 · cloudflared is the only ingress</text>
    </g>

    <g transform="translate(16,210)">

        <text x="50" y="28" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#d4d4d4">AIDE</text>
        <text x="50" y="38" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#525252">daily integrity</text>
      </g>
      <g transform="translate(330,12)">

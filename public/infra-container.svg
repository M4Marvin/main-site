        <rect width="100" height="40" rx="4" fill="#1a1a1a" stroke="#525252" stroke-width="0.5"/>
        <text x="50" y="14" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#737373">&lt;&lt;component&gt;&gt;</text>
        <text x="50" y="28" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#d4d4d4">unattended-upgr</text>
        <text x="50" y="38" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#525252">auto security</text>
      </g>
      <g transform="translate(550,12)">
        <rect width="100" height="40" rx="4" fill="#1a1a1a" stroke="#525252" stroke-width="0.5"/>
        <text x="50" y="14" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#737373">&lt;&lt;component&gt;&gt;</text>
        <text x="50" y="28" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#d4d4d4">SSH</text>
        <text x="50" y="38" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#525252">:3232 key-only</text>
      </g>
    </g>

    <g transform="translate(16,290)">
      <text x="0" y="0" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#a3a3a3">Data volumes (~/data/)</text>
      <g font-family="ui-monospace, monospace" font-size="9" fill="#737373">
        <text x="0" y="18">forgejo/ · vaultwarden/ · kuma/ · chat/ · files/ · copyparty-conf/</text>

      <text x="14" y="16" font-family="ui-monospace, monospace" font-size="7" fill="#f48120">&lt;&lt;container&gt;&gt; · systemd service</text>
      <text x="14" y="30" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#f48120">cloudflared</text>
      <text x="100" y="30" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">outbound-only · 4 long-lived conns to 2 Cloudflare PoPs · post-quantum</text>
      <text x="14" y="42" font-family="ui-monospace, monospace" font-size="8" fill="#737373">config: /etc/cloudflared/config.yml · tunnel UUID ffd206b8-...</text>

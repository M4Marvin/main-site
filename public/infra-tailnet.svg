<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Tailscale tailnet topology: four devices (hetzner-vps, beast, macbook, phone) connected in a WireGuard mesh, each with its 100.x.y.z address and the services it hosts">
  <defs>
    <linearGradient id="ts-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <marker id="ts-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="url(#ts-bg)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#737373">
    <text x="20" y="22" font-size="10" fill="#a3a3a3" letter-spacing="2">TAILSCALE TAILNET · WIREGUARD MESH</text>
    <text x="780" y="22" font-size="10" fill="#a3a3a3" letter-spacing="2" text-anchor="end">100.x.y.z</text>
  </g>

  <g transform="translate(250,50)">
    <rect width="140" height="80" rx="6" fill="#1a1a1a" stroke="#a855f7" stroke-width="1.5"/>
    <text x="130" y="14" text-anchor="end" font-family="ui-monospace, monospace" font-size="7" fill="#a855f7">&lt;&lt;node&gt;&gt;</text>
    <text x="12" y="30" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#c4b5fd">hetzner-vps</text>
    <text x="12" y="46" font-family="ui-monospace, monospace" font-size="9" fill="#a855f7">100.80.96.4</text>
    <text x="12" y="62" font-family="ui-monospace, monospace" font-size="8" fill="#737373">Ubuntu 24.04</text>
    <text x="12" y="74" font-family="ui-monospace, monospace" font-size="8" fill="#737373">7 public services</text>
  </g>

  <g transform="translate(490,50)">
    <rect width="140" height="80" rx="6" fill="#1a1a1a" stroke="#a855f7" stroke-width="1.5"/>
    <text x="130" y="14" text-anchor="end" font-family="ui-monospace, monospace" font-size="7" fill="#a855f7">&lt;&lt;node&gt;&gt;</text>
    <text x="12" y="30" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#c4b5fd">beast</text>
    <text x="12" y="46" font-family="ui-monospace, monospace" font-size="9" fill="#a855f7">100.105.177.97</text>
    <text x="12" y="62" font-family="ui-monospace, monospace" font-size="8" fill="#737373">Arch · 93GB · Arc Pro</text>
    <text x="12" y="74" font-family="ui-monospace, monospace" font-size="8" fill="#737373">Immich · Jellyfin · CI</text>
  </g>

  <g transform="translate(130,250)">
    <rect width="140" height="80" rx="6" fill="#1a1a1a" stroke="#a855f7" stroke-width="1.5"/>
    <text x="130" y="14" text-anchor="end" font-family="ui-monospace, monospace" font-size="7" fill="#a855f7">&lt;&lt;node&gt;&gt;</text>
    <text x="12" y="30" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#c4b5fd">macbook</text>
    <text x="12" y="46" font-family="ui-monospace, monospace" font-size="9" fill="#a855f7">100.71.249.91</text>
    <text x="12" y="62" font-family="ui-monospace, monospace" font-size="8" fill="#737373">macOS</text>
    <text x="12" y="74" font-family="ui-monospace, monospace" font-size="8" fill="#737373">admin · SSH · dev</text>
  </g>

  <g transform="translate(490,250)">
    <rect width="140" height="80" rx="6" fill="#1a1a1a" stroke="#a855f7" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="130" y="14" text-anchor="end" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;offline&gt;&gt;</text>
    <text x="12" y="30" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#737373">phone</text>
    <text x="12" y="46" font-family="ui-monospace, monospace" font-size="9" fill="#525252">100.91.245.46</text>
    <text x="12" y="62" font-family="ui-monospace, monospace" font-size="8" fill="#525252">Android · offline 23d</text>
  </g>

  <g fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.5">
    <path d="M 390 90 L 490 90" stroke-dasharray="4 3"/>
    <path d="M 320 130 L 200 250" stroke-dasharray="4 3"/>
    <path d="M 390 130 L 540 250" stroke-dasharray="4 3"/>
    <path d="M 550 90 L 560 250" stroke-dasharray="4 3"/>
    <path d="M 270 290 L 490 290" stroke-dasharray="4 3"/>
  </g>

  <g font-family="ui-monospace, monospace" font-size="7" fill="#525252">
    <text x="440" y="84" text-anchor="middle">WireGuard</text>
    <text x="240" y="195" text-anchor="middle">WireGuard</text>
    <text x="480" y="195" text-anchor="middle">WireGuard</text>
  </g>

  <g transform="translate(680,290)">
    <rect width="100" height="80" rx="6" fill="#0f0f0f" stroke="#a855f7" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="12" y="20" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#a855f7">MagicDNS</text>
    <text x="12" y="36" font-family="ui-monospace, monospace" font-size="8" fill="#737373">resolves node</text>
    <text x="12" y="48" font-family="ui-monospace, monospace" font-size="8" fill="#737373">names to tailnet</text>
    <text x="12" y="60" font-family="ui-monospace, monospace" font-size="8" fill="#737373">IPs automatically</text>
    <text x="12" y="72" font-family="ui-monospace, monospace" font-size="8" fill="#525252">no manual DNS</text>
  </g>

  <g transform="translate(20,350)">
    <text x="0" y="0" font-family="ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="1">LEGEND</text>
    <g transform="translate(0,12)">
      <rect width="16" height="12" rx="2" fill="#1a1a1a" stroke="#a855f7" stroke-width="1"/>
      <text x="24" y="11" font-family="ui-monospace, monospace" font-size="8" fill="#737373">online node</text>
    </g>
    <g transform="translate(120,12)">
      <rect width="16" height="12" rx="2" fill="#1a1a1a" stroke="#737373" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="24" y="11" font-family="ui-monospace, monospace" font-size="8" fill="#737373">offline node</text>
    </g>
    <g transform="translate(230,18)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="26" y="3" font-family="ui-monospace, monospace" font-size="8" fill="#737373">WireGuard tunnel</text>
    </g>
  </g>
</svg>

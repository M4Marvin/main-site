<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="C4 Container diagram: the Hetzner VPS runs a single Docker container with FastAPI serving both the API and the React SPA static files, with a Parquet data lake bind-mounted from the host">
  <defs>
    <linearGradient id="ctn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <marker id="ctn-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
    <marker id="ctn-arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f48120"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="url(#ctn-bg)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#737373">
    <text x="20" y="22" font-size="10" fill="#a3a3a3" letter-spacing="2">C4 · LEVEL 2 · CONTAINER</text>
    <text x="780" y="22" font-size="10" fill="#a3a3a3" letter-spacing="2" text-anchor="end">mFinancialCharts</text>
  </g>

  <g transform="translate(20,40)">
    <rect width="170" height="80" rx="6" fill="#171717" stroke="#f48120" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text x="160" y="16" text-anchor="end" font-family="ui-monospace, monospace" font-size="7" fill="#f48120" font-style="italic">&lt;&lt;external&gt;&gt;</text>
    <text x="14" y="34" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#f48120">Cloudflare Tunnel</text>
    <text x="14" y="50" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">cloudflared · systemd</text>
    <text x="14" y="64" font-family="ui-monospace, monospace" font-size="8" fill="#737373">outbound-only</text>
    <text x="14" y="74" font-family="ui-monospace, monospace" font-size="8" fill="#737373">post-quantum</text>
  </g>

  <g transform="translate(210,40)">
    <rect width="570" height="410" rx="10" fill="#0f0f0f" stroke="#404040" stroke-width="1.5" stroke-dasharray="8 4"/>
    <text x="16" y="22" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#e5e5e5">Hetzner VPS · 77.42.65.13</text>
    <text x="554" y="22" text-anchor="end" font-family="ui-monospace, monospace" font-size="9" fill="#737373">Ubuntu 24.04 · 4 vCPU · 7.6GB</text>

    <g transform="translate(16,40)">
      <rect width="538" height="44" rx="4" fill="#151515" stroke="#f48120" stroke-width="1"/>
      <text x="12" y="16" font-family="ui-monospace, monospace" font-size="7" fill="#f48120">&lt;&lt;container&gt;&gt; · systemd service</text>
      <text x="12" y="30" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#f48120">cloudflared</text>
      <text x="100" y="30" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">routes charts.m4marvin.com → 127.0.0.1:8006</text>
      <text x="12" y="42" font-family="ui-monospace, monospace" font-size="8" fill="#737373">same tunnel as all other services · no extra ingress</text>
    </g>

    <g transform="translate(16,100)">
      <rect width="538" height="250" rx="8" fill="#1a1a1a" stroke="#e5e5e5" stroke-width="2"/>
      <text x="14" y="20" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#ffffff">Docker Container</text>
      <text x="524" y="20" text-anchor="end" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3" font-style="italic">&lt;&lt;container&gt;&gt;</text>
      <text x="14" y="34" font-family="ui-monospace, monospace" font-size="8" fill="#737373">python:3.14-slim · multi-stage build · port 8006</text>

      <g transform="translate(14,46)">
        <rect width="240" height="84" rx="4" fill="#222" stroke="#525252" stroke-width="1"/>
        <text x="230" y="14" text-anchor="end" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;container&gt;&gt;</text>
        <text x="12" y="28" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#e5e5e5">FastAPI · uvicorn</text>
        <text x="12" y="44" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">14 endpoints · Pydantic v2</text>
        <text x="12" y="58" font-family="ui-monospace, monospace" font-size="8" fill="#737373">Polars · PyArrow · Pandas</text>
        <text x="12" y="72" font-family="ui-monospace, monospace" font-size="8" fill="#f48120">serves API + static SPA files</text>
      </g>

      <g transform="translate(268,46)">
        <rect width="256" height="84" rx="4" fill="#222" stroke="#525252" stroke-width="1"/>
        <text x="246" y="14" text-anchor="end" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;container&gt;&gt;</text>
        <text x="12" y="28" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#e5e5e5">React SPA</text>
        <text x="12" y="44" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">Vite build · static files</text>
        <text x="12" y="58" font-family="ui-monospace, monospace" font-size="8" fill="#737373">TanStack Query · Zustand</text>
        <text x="12" y="72" font-family="ui-monospace, monospace" font-size="8" fill="#737373">11 Canvas 2D renderers</text>
      </g>

      <path d="M 254 88 L 268 88" fill="none" stroke="#525252" stroke-width="1.5" marker-end="url(#ctn-arrow)"/>
      <text x="261" y="84" text-anchor="middle" font-family="ui-monospace, monospace" font-size="6" fill="#525252">serves</text>

      <g transform="translate(14,142)">
        <rect width="240" height="56" rx="4" fill="#1a1a1a" stroke="#525252" stroke-width="0.5"/>
        <text x="230" y="14" text-anchor="end" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;component&gt;&gt;</text>
        <text x="12" y="28" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#d4d4d4">File Index</text>
        <text x="12" y="42" font-family="ui-monospace, monospace" font-size="8" fill="#737373">in-memory tree · built on startup</text>
        <text x="12" y="52" font-family="ui-monospace, monospace" font-size="8" fill="#525252">Market→Symbol→Year→Month→Day</text>
      </g>

      <g transform="translate(268,142)">
        <rect width="256" height="56" rx="4" fill="#1a1a1a" stroke="#525252" stroke-width="0.5"/>
        <text x="246" y="14" text-anchor="end" font-family="ui-monospace, monospace" font-size="7" fill="#737373">&lt;&lt;component&gt;&gt;</text>
        <text x="12" y="28" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#d4d4d4">CLI · Typer</text>
        <text x="12" y="42" font-family="ui-monospace, monospace" font-size="8" fill="#737373">21 commands · offline ETL</text>
        <text x="12" y="52" font-family="ui-monospace, monospace" font-size="8" fill="#525252">docker exec · not a running service</text>
      </g>

      <g transform="translate(14,208)">
        <text x="0" y="0" font-family="ui-monospace, monospace" font-size="8" fill="#737373">↳ both read the Parquet data lake via bind mount · container is stateless</text>
      </g>
    </g>

    <g transform="translate(16,364)">
      <text x="0" y="0" font-family="ui-sans-serif, system-ui" font-size="11" font-weight="700" fill="#a3a3a3">Bind mounts</text>
      <g transform="translate(0,10)">
        <rect width="250" height="32" rx="4" fill="#151515" stroke="#525252" stroke-width="0.5"/>
        <text x="10" y="14" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">data/ → Parquet data lake (~1.5GB)</text>
        <text x="10" y="26" font-family="ui-monospace, monospace" font-size="7" fill="#525252">{exchange}/{market}/{symbol}/{Y}/{M}/{D}/*.parquet</text>
      </g>
      <g transform="translate(268,10)">
        <rect width="120" height="32" rx="4" fill="#151515" stroke="#525252" stroke-width="0.5"/>
        <text x="10" y="14" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">logs/ → runtime</text>
        <text x="10" y="26" font-family="ui-monospace, monospace" font-size="7" fill="#525252">uvicorn access logs</text>
      </g>
      <g transform="translate(400,10)">
        <rect width="138" height="32" rx="4" fill="#151515" stroke="#525252" stroke-width="0.5"/>
        <text x="10" y="14" font-family="ui-monospace, monospace" font-size="8" fill="#a3a3a3">config.toml</text>
        <text x="10" y="26" font-family="ui-monospace, monospace" font-size="7" fill="#525252">generated at startup</text>
      </g>
    </g>
  </g>

  <path d="M 190 80 L 210 80" fill="none" stroke="#f48120" stroke-width="1.5" marker-end="url(#ctn-arrow-orange)"/>
  <path d="M 210 100 L 190 100" fill="none" stroke="#f48120" stroke-width="1.5" marker-end="url(#ctn-arrow-orange)"/>
  <text x="200" y="72" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7" fill="#f48120">tunnel</text>

  <g transform="translate(20,470)">
    <text x="0" y="0" font-family="ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="1">LEGEND</text>
    <g transform="translate(0,12)">
      <rect width="16" height="12" rx="2" fill="#222" stroke="#525252" stroke-width="1"/>
      <text x="24" y="11" font-family="ui-monospace, monospace" font-size="8" fill="#737373">container</text>
    </g>
    <g transform="translate(100,12)">
      <rect width="16" height="12" rx="2" fill="#1a1a1a" stroke="#e5e5e5" stroke-width="2"/>
      <text x="24" y="11" font-family="ui-monospace, monospace" font-size="8" fill="#737373">system under design</text>
    </g>
    <g transform="translate(250,12)">
      <rect width="16" height="12" rx="2" fill="#151515" stroke="#f48120" stroke-width="1"/>
      <text x="24" y="11" font-family="ui-monospace, monospace" font-size="8" fill="#737373">sidecar (systemd)</text>
    </g>
    <g transform="translate(380,12)">
      <rect width="16" height="12" rx="2" fill="#0f0f0f" stroke="#404040" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="24" y="11" font-family="ui-monospace, monospace" font-size="8" fill="#737373">system boundary</text>
    </g>
    <g transform="translate(500,12)">
      <rect width="16" height="12" rx="2" fill="#1a1a1a" stroke="#525252" stroke-width="0.5"/>
      <text x="24" y="11" font-family="ui-monospace, monospace" font-size="8" fill="#737373">component</text>
    </g>
  </g>
</svg>
